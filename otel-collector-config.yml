extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s

exporters:
  kafka:
    brokers: ["kafka:9092"]
    topic: "comic-ingestion-logs"
    # FIX: "json" is no longer valid; use a specific marshaler
    encoding: otlp_json 

  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true

  # FIX: Using otlp_grpc instead of deprecated otlp alias
  otlp_grpc/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # FIX: debug exporter used instead of deprecated logging
  debug:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka, debug]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]