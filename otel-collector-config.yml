receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: 
    timeout: 100ms # Added explicit flush timeout for high-resolution updates
  resource:
    attributes:
      - key: service_name
        from_attribute: service.name
        action: insert

exporters:
  prometheus:
    # This is the "Data Endpoint" (Business Metrics)
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: false 

  otlphttp/loki:
    endpoint: "http://loki:3100/otlp" 
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  telemetry:
    metrics:
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                # This is the "Internal Endpoint" (Collector Health)
                port: 8888 
  
  extensions: [health_check]

  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/loki]