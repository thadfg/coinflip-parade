global:
  scrape_interval: 15s

scrape_configs:
  # The Unified metrics from your apps + OTLP data
  - job_name: 'otel-collector-unified'
    static_configs:
      - targets: ['otel-collector:8889']

  # Internal health of the OTel Collector itself
  - job_name: 'otel-collector-internal'
    static_configs:
      - targets: ['otel-collector:8888']